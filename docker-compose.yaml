# 前后端分离：backend(API/订阅) + frontend(Nginx 静态页 + 代理)
services:
  backend:
    image: knighttools/subscribe-manager-backend:latest
    container_name: subscribe-manager-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      # 对齐 .env 的 DB_PATH=./data/...（容器 WORKDIR=/app/backend），宿主机 ./data 可见
      - ./data:/app/backend/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${BACKEND_PORT}/version >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: knighttools/subscribe-manager-frontend:latest
    container_name: subscribe-manager-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    environment:
      # 容器内通过服务名访问后端，不能用 localhost
      BACKEND_UPSTREAM: http://backend:${BACKEND_PORT}
    depends_on:
      backend:
        condition: service_healthy
